# vinylctl 10-band equalizer sink (managed by vinylctl — live values are set
# via pw-cli and persisted in ~/.config/vinylctl/eq.json; this file only
# defines the graph with flat defaults)
context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "Equalizer (vinylctl)"
            media.name       = "Equalizer (vinylctl)"
            filter.graph = {
                nodes = [
                    { type = builtin name = preamp label = linear     control = { "Mult" = 1.0 } }
                    { type = builtin name = eq1  label = bq_peaking control = { "Freq" = 32.0    "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq2  label = bq_peaking control = { "Freq" = 64.0    "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq3  label = bq_peaking control = { "Freq" = 125.0   "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq4  label = bq_peaking control = { "Freq" = 250.0   "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq5  label = bq_peaking control = { "Freq" = 500.0   "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq6  label = bq_peaking control = { "Freq" = 1000.0  "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq7  label = bq_peaking control = { "Freq" = 2000.0  "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq8  label = bq_peaking control = { "Freq" = 4000.0  "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq9  label = bq_peaking control = { "Freq" = 8000.0  "Q" = 1.1 "Gain" = 0.0 } }
                    { type = builtin name = eq10 label = bq_peaking control = { "Freq" = 16000.0 "Q" = 1.1 "Gain" = 0.0 } }
                ]
                links = [
                    { output = "preamp:Out" input = "eq1:In" }
                    { output = "eq1:Out"  input = "eq2:In" }
                    { output = "eq2:Out"  input = "eq3:In" }
                    { output = "eq3:Out"  input = "eq4:In" }
                    { output = "eq4:Out"  input = "eq5:In" }
                    { output = "eq5:Out"  input = "eq6:In" }
                    { output = "eq6:Out"  input = "eq7:In" }
                    { output = "eq7:Out"  input = "eq8:In" }
                    { output = "eq8:Out"  input = "eq9:In" }
                    { output = "eq9:Out"  input = "eq10:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "vinylctl_eq"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name    = "vinylctl_eq.output"
                node.passive = true
            }
        }
    }
]
